<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="system-ui, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="520" rx="20" fill="#ffffff" />
  <rect x="0.5" y="0.5" width="919" height="519" rx="20" fill="none" stroke="#e2e8f0" />

  <text x="460" y="46" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">EduTrack — Flujo de datos</text>
  <text x="460" y="72" text-anchor="middle" font-size="13" fill="#64748b">Aplicación móvil integrada con servicios en la nube</text>

  <!-- App móvil -->
  <rect x="70" y="150" width="250" height="280" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="2" />
  <text x="195" y="182" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">📱 App móvil</text>
  <text x="195" y="200" text-anchor="middle" font-size="11" fill="#6366f1">React + Vite</text>

  <rect x="100" y="222" width="190" height="64" rx="12" fill="#ffffff" stroke="#c7d2fe" />
  <text x="195" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Interfaz de usuario</text>

  <line x1="195" y1="286" x2="195" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="100" y="332" width="190" height="64" rx="12" fill="#ffffff" stroke="#c7d2fe" />
  <text x="195" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Servicios</text>
  <text x="195" y="380" text-anchor="middle" font-size="11" fill="#64748b">services/</text>

  <!-- Nube -->
  <text x="710" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">☁️ Servicios en la nube</text>

  <!-- Auth -->
  <rect x="560" y="158" width="300" height="66" rx="12" fill="#ffffff" stroke="#e2e8f0" />
  <rect x="560" y="158" width="6" height="66" rx="3" fill="#f59e0b" />
  <text x="582" y="186" font-size="14" font-weight="700" fill="#0f172a">Firebase Authentication</text>
  <text x="582" y="206" font-size="11" fill="#64748b">Registro · verificación por correo · JWT</text>

  <!-- Firestore -->
  <rect x="560" y="246" width="300" height="66" rx="12" fill="#ffffff" stroke="#e2e8f0" />
  <rect x="560" y="246" width="6" height="66" rx="3" fill="#6366f1" />
  <text x="582" y="274" font-size="14" font-weight="700" fill="#0f172a">Cloud Firestore</text>
  <text x="582" y="294" font-size="11" fill="#64748b">Base de datos NoSQL en tiempo real</text>

  <!-- YouTube -->
  <rect x="560" y="334" width="300" height="66" rx="12" fill="#ffffff" stroke="#e2e8f0" />
  <rect x="560" y="334" width="6" height="66" rx="3" fill="#ef4444" />
  <text x="582" y="362" font-size="14" font-weight="700" fill="#0f172a">YouTube Data API v3</text>
  <text x="582" y="382" font-size="11" fill="#64748b">API REST · búsqueda de videos</text>

  <!-- Flechas Servicios -> Nube -->
  <path d="M290,356 C430,356 430,191 560,191" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M290,362 C430,362 430,279 560,279" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M290,368 C430,368 430,367 560,367" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <text x="440" y="184" text-anchor="middle" font-size="10.5" fill="#475569">login / verificación</text>
  <text x="444" y="272" text-anchor="middle" font-size="10.5" fill="#475569">CRUD en tiempo real</text>
  <text x="440" y="360" text-anchor="middle" font-size="10.5" fill="#475569">GET búsqueda</text>

  <!-- Retorno en tiempo real -->
  <path d="M560,265 C430,265 330,254 292,254" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDash)" />

  <text x="460" y="468" text-anchor="middle" font-size="11.5" fill="#64748b">Los cambios en Firestore y el estado de sesión (token JWT) se reflejan en la interfaz al instante</text>
  <text x="460" y="486" text-anchor="middle" font-size="11.5" fill="#64748b">mediante los listeners onSnapshot() y onAuthStateChanged().</text>
</svg>
